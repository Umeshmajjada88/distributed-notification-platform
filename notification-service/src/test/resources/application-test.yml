spring:

  datasource:

    url: jdbc:h2:mem:notification_test_db

    driver-class-name: org.h2.Driver

    username: sa

    password:

  jpa:

    hibernate:

      ddl-auto: create-drop

    show-sql: false

    properties:

      hibernate:

        format_sql: true

  flyway:

    enabled: false

  kafka:

    bootstrap-servers: localhost:9092

logging:

  level:

    root: WARN

    org.springframework.test: INFO